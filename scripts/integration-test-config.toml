# Minimal OpenSandbox server config for integration tests.
# No api_key = auth disabled (suitable for local/CI).
[server]
host = "0.0.0.0"
port = 8090
log_level = "INFO"

[runtime]
type = "docker"
execd_image = "opensandbox/execd:v1.0.6"

[docker]
network_mode = "bridge"
# When server runs in a container, host IP for bridge-mode endpoints.
# 127.0.0.1 lets the host (where tests run) reach sandbox port mappings via localhost.
host_ip = "127.0.0.1"
